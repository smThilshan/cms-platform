name: cms_mobile
description: CMS Platform mobile client — read-only public content viewer.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.7.0

  # State management
  flutter_bloc: ^9.1.1

  # Navigation
  go_router: ^15.1.2

  # HTML rendering (CKEditor output)
  flutter_html: ^3.0.0-beta.2

  # Image caching
  cached_network_image: ^3.4.1

  # Environment config
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
